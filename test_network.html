<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络连接测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 3px; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>网络连接测试</h1>
    
    <div class="test-section">
        <h3>1. 测试后端连接</h3>
        <button onclick="testBackend()">测试连接</button>
        <div id="backend-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>2. 测试聊天API</h3>
        <button onclick="testChat()">测试聊天</button>
        <div id="chat-result" class="result"></div>
    </div>

    <script>
        function testBackend() {
            const resultDiv = document.getElementById('backend-result');
            resultDiv.innerHTML = '正在测试...';
            
            fetch('http://localhost:8002/health')
                .then(response => response.json())
                .then(data => {
                    resultDiv.innerHTML = `
                        <strong>✅ 后端连接成功</strong><br>
                        状态: ${data.status}<br>
                        服务: ${data.service}
                    `;
                })
                .catch(error => {
                    resultDiv.innerHTML = `
                        <strong>❌ 后端连接失败</strong><br>
                        错误: ${error.message}<br>
                        可能的原因: CORS跨域问题或网络连接问题
                    `;
                });
        }
        
        function testChat() {
            const resultDiv = document.getElementById('chat-result');
            resultDiv.innerHTML = '正在测试...';
            
            fetch('http://localhost:8002/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: '测试消息' })
            })
                .then(response => response.json())
                .then(data => {
                    resultDiv.innerHTML = `
                        <strong>✅ 聊天API成功</strong><br>
                        成功: ${data.success}<br>
                        回复: ${data.response ? data.response.substring(0, 100) + '...' : '无回复'}
                    `;
                })
                .catch(error => {
                    resultDiv.innerHTML = `
                        <strong>❌ 聊天API失败</strong><br>
                        错误: ${error.message}<br>
                        可能的原因: CORS跨域问题
                    `;
                });
        }
        
        // 页面加载时自动测试
        window.onload = function() {
            testBackend();
        };
    </script>
</body>
</html>
