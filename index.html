<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法律AI助手 - 智能法律咨询与证据分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 60px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #1e40af;
            font-size: 36px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .subtitle {
            color: #64748b;
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .features {
            text-align: left;
            margin: 40px 0;
            padding: 0 20px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin: 16px 0;
            color: #475569;
            font-size: 16px;
        }

        .feature-item::before {
            content: "✓";
            display: inline-block;
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #1e40af, #2563eb);
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            margin-right: 12px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #1e40af, #2563eb);
            color: white;
            padding: 16px 48px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(30, 64, 175, 0.4);
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 64, 175, 0.6);
        }

        .version {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>法律AI助手</h1>
        <p class="subtitle">智能法律咨询与证据分析系统</p>

        <div class="features">
            <div class="feature-item">AI智能法律咨询</div>
            <div class="feature-item">证据链分析与管理</div>
            <div class="feature-item">证据效力评估</div>
            <div class="feature-item">风险评估报告</div>
            <div class="feature-item">个人中心与案件管理</div>
        </div>

        <a href="src/pages/professional.html" class="btn">进入系统</a>

        <div class="version">版本 1.0.0 | 2026-02-23</div>
    </div>

    <script>
        window.location.href = 'src/pages/professional.html';
    </script>
</body>

</html>
