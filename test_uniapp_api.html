<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniApp API测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 3px; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 3px; width: 200px; }
    </style>
</head>
<body>
    <h1>UniApp API连接测试</h1>
    
    <div class="test-section">
        <h3>1. 测试聊天API (模拟UniApp调用)</h3>
        <input type="text" id="chat-message" placeholder="输入聊天消息" value="什么是试用期？">
        <button onclick="testUniAppChat()">发送消息</button>
        <div id="chat-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>2. 测试法律条文搜索API (模拟UniApp调用)</h3>
        <input type="text" id="search-keyword" placeholder="输入搜索关键词" value="试用期">
        <button onclick="testUniAppSearch()">搜索条文</button>
        <div id="search-result" class="result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8002';
        
        // 模拟UniApp的uni.request方法
        function mockUniRequest(options) {
            return new Promise((resolve, reject) => {
                fetch(options.url, {
                    method: options.method || 'GET',
                    headers: options.header || {},
                    body: options.data ? JSON.stringify(options.data) : undefined
                })
                .then(response => response.json())
                .then(data => {
                    // 模拟UniApp的返回格式 [error, response]
                    resolve([null, { data: data, statusCode: 200 }]);
                })
                .catch(error => {
                    reject([error, null]);
                });
            });
        }
        
        async function testUniAppChat() {
            const message = document.getElementById('chat-message').value;
            const resultDiv = document.getElementById('chat-result');
            resultDiv.innerHTML = '正在发送...';
            
            try {
                const response = await mockUniRequest({
                    url: `${API_BASE}/api/chat`,
                    method: 'POST',
                    data: { message },
                    header: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = response[1].data;
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <strong>✅ 聊天成功</strong><br>
                        <div style="margin: 10px 0; padding: 10px; background: white; border-radius: 5px;">
                            ${data.response.substring(0, 300)}...
                        </div>
                        相关法律条文: ${data.related_articles ? data.related_articles.length : 0} 条
                    `;
                } else {
                    resultDiv.innerHTML = `<strong>❌ 聊天失败</strong><br>错误: ${data.message}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<strong>❌ 聊天失败</strong><br>错误: ${error[0] ? error[0].message : '未知错误'}`;
            }
        }
        
        async function testUniAppSearch() {
            const keyword = document.getElementById('search-keyword').value;
            const resultDiv = document.getElementById('search-result');
            resultDiv.innerHTML = '正在搜索...';
            
            try {
                const response = await mockUniRequest({
                    url: `${API_BASE}/api/legal-articles/search`,
                    method: 'POST',
                    data: { keyword },
                    header: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = response[1].data;
                
                if (data.success) {
                    const articles = data.data.articles;
                    let html = `<strong>✅ 搜索成功</strong><br>找到 ${articles.length} 条结果:<br><br>`;
                    
                    articles.slice(0, 3).forEach((article, index) => {
                        html += `
                            <div style="margin: 10px 0; padding: 10px; background: white; border-left: 3px solid #007bff;">
                                <strong>${index + 1}. ${article.title}</strong><br>
                                <small>法律: ${article.law_name}</small><br>
                                ${article.content.substring(0, 100)}...
                            </div>
                        `;
                    });
                    
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `<strong>❌ 搜索失败</strong><br>错误: ${data.message}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<strong>❌ 搜索失败</strong><br>错误: ${error[0] ? error[0].message : '未知错误'}`;
            }
        }
        
        // 页面加载时自动测试
        window.onload = function() {
            console.log('UniApp API测试页面加载完成');
        };
    </script>
</body>
</html>
