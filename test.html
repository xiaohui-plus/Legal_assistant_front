<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法义AI助手 - 测试版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
        }
        
        .test-section {
            margin: 30px 0;
        }
        
        .test-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        
        .test-title::before {
            content: "🔧";
            margin-right: 8px;
        }
        
        .test-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .test-item:hover {
            background: #e3f2fd;
            border-color: #2196f3;
        }
        
        .test-item h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .test-item p {
            color: #666;
            font-size: 14px;
        }
        
        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f1f3f4;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚖️</div>
            <h1>法义AI助手</h1>
            <p class="subtitle">UniApp + Flask 后端连接测试</p>
        </div>
        
        <div class="test-section">
            <div class="test-title">后端API测试</div>
            
            <div class="test-item" onclick="testHealth()">
                <h3>健康检查 <span id="health-status" class="status pending">待测试</span></h3>
                <p>测试Flask后端服务是否正常运行</p>
                <div id="health-result" class="result"></div>
            </div>
            
            <div class="test-item" onclick="testRegister()">
                <h3>用户注册 <span id="register-status" class="status pending">待测试</span></h3>
                <p>测试用户注册功能</p>
                <div id="register-result" class="result"></div>
            </div>
            
            <div class="test-item" onclick="testLogin()">
                <h3>用户登录 <span id="login-status" class="status pending">待测试</span></h3>
                <p>测试用户登录功能</p>
                <div id="login-result" class="result"></div>
            </div>
            
            <div class="test-item" onclick="testChat()">
                <h3>AI对话 <span id="chat-status" class="status pending">待测试</span></h3>
                <p>测试AI法律咨询功能</p>
                <div id="chat-result" class="result"></div>
            </div>
            
            <div class="test-item" onclick="testTemplates()">
                <h3>文书模板 <span id="templates-status" class="status pending">待测试</span></h3>
                <p>测试文书模板获取功能</p>
                <div id="templates-result" class="result"></div>
            </div>
        </div>
        
        <div class="footer">
            <p>🚀 后端服务地址: http://localhost:8001</p>
            <p>📱 前端框架: UniApp (Vue 2.x + Vuex)</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001';
        
        // 通用请求函数
        async function apiRequest(url, options = {}) {
            try {
                const response = await fetch(API_BASE + url, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    ...options
                });
                
                const data = await response.json();
                return { success: response.ok, data, status: response.status };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }
        
        // 更新状态
        function updateStatus(testName, status, message) {
            const statusEl = document.getElementById(`${testName}-status`);
            const resultEl = document.getElementById(`${testName}-result`);
            
            statusEl.className = `status ${status}`;
            statusEl.textContent = status === 'success' ? '成功' : status === 'error' ? '失败' : '测试中...';
            
            resultEl.textContent = message;
            resultEl.className = 'result show';
        }
        
        // 测试健康检查
        async function testHealth() {
            updateStatus('health', 'pending', '正在检查后端服务...');
            
            const result = await apiRequest('/health');
            
            if (result.success) {
                updateStatus('health', 'success', `✅ 服务正常运行\n版本: ${result.data.version}\n时间: ${new Date(result.data.timestamp * 1000).toLocaleString()}`);
            } else {
                updateStatus('health', 'error', `❌ 服务连接失败: ${result.error || '未知错误'}`);
            }
        }
        
        // 测试用户注册
        async function testRegister() {
            updateStatus('register', 'pending', '正在测试用户注册...');
            
            const testUser = {
                phone: '13800138000',
                password: '123456',
                nickname: '测试用户'
            };
            
            const result = await apiRequest('/api/auth/register', {
                method: 'POST',
                body: JSON.stringify(testUser)
            });
            
            if (result.success && result.data.success) {
                updateStatus('register', 'success', `✅ 注册成功\n用户ID: ${result.data.user.id}\n昵称: ${result.data.user.nickname}`);
                // 保存token用于后续测试
                localStorage.setItem('testToken', result.data.token);
            } else {
                updateStatus('register', 'error', `❌ 注册失败: ${result.data?.message || result.error || '未知错误'}`);
            }
        }
        
        // 测试用户登录
        async function testLogin() {
            updateStatus('login', 'pending', '正在测试用户登录...');
            
            const loginData = {
                phone: '13800138000',
                password: '123456'
            };
            
            const result = await apiRequest('/api/auth/login', {
                method: 'POST',
                body: JSON.stringify(loginData)
            });
            
            if (result.success && result.data.success) {
                updateStatus('login', 'success', `✅ 登录成功\n用户: ${result.data.user.nickname}\n手机: ${result.data.user.phone}`);
                localStorage.setItem('testToken', result.data.token);
            } else {
                updateStatus('login', 'error', `❌ 登录失败: ${result.data?.message || result.error || '未知错误'}`);
            }
        }
        
        // 测试AI对话
        async function testChat() {
            updateStatus('chat', 'pending', '正在测试AI对话...');
            
            const chatData = {
                message: '我想了解一下劳动合同的试用期规定'
            };
            
            const result = await apiRequest('/api/chat', {
                method: 'POST',
                body: JSON.stringify(chatData)
            });
            
            if (result.success && result.data.success) {
                const response = result.data.response.substring(0, 200) + '...';
                updateStatus('chat', 'success', `✅ AI回复成功\n内容预览: ${response}`);
            } else {
                updateStatus('chat', 'error', `❌ AI对话失败: ${result.data?.message || result.error || '未知错误'}`);
            }
        }
        
        // 测试文书模板
        async function testTemplates() {
            updateStatus('templates', 'pending', '正在获取文书模板...');
            
            const result = await apiRequest('/api/documents/templates');
            
            if (result.success && result.data.success) {
                const templates = result.data.templates;
                updateStatus('templates', 'success', `✅ 获取成功\n模板数量: ${templates.length}\n模板: ${templates.map(t => t.name).join(', ')}`);
            } else {
                updateStatus('templates', 'error', `❌ 获取失败: ${result.data?.message || result.error || '未知错误'}`);
            }
        }
        
        // 页面加载完成后自动测试健康检查
        window.onload = function() {
            setTimeout(testHealth, 1000);
        };
    </script>
</body>
</html>
