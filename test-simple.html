<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #4F46E5 0%, #3B82F6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .container {
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #10B981;
            font-size: 32px;
            margin: 0 0 20px 0;
        }

        p {
            color: #64748B;
            font-size: 16px;
            line-height: 1.6;
        }

        .status {
            margin-top: 30px;
            padding: 15px;
            background: #F0FDF4;
            border-radius: 10px;
            color: #166534;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>✅ 静态页面加载成功</h1>
        <p>如果你能看到这个页面，说明服务器正常运行。</p>
        <div class="status">
            <strong>问题分析：</strong> URI malformed 错误可能是 uni-app 或 Vite 处理某些文件时的编码问题。
        </div>
    </div>
</body>

</html>
