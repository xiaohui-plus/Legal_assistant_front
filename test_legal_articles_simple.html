<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法律条文查询测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f7f8fa;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .title {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 20px;
            text-align: center;
        }
        .test-section {
            margin-bottom: 24px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .test-title {
            font-size: 16px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
        }
        .test-button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 12px;
            margin-bottom: 8px;
        }
        .test-button:hover {
            background: #5a6fd8;
        }
        .result {
            margin-top: 12px;
            padding: 12px;
            background: white;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        .success {
            border-color: #10b981;
            background: #f0fdf4;
        }
        .error {
            border-color: #ef4444;
            background: #fef2f2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">法律条文查询功能测试</h1>
        
        <div class="test-section">
            <div class="test-title">1. 测试后端API连接</div>
            <button class="test-button" onclick="testBackendConnection()">测试连接</button>
            <div id="connectionResult" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <div class="test-title">2. 测试法律条文搜索</div>
            <button class="test-button" onclick="testSearch('试用期')">搜索"试用期"</button>
            <button class="test-button" onclick="testSearch('离婚')">搜索"离婚"</button>
            <button class="test-button" onclick="testSearch('交通事故')">搜索"交通事故"</button>
            <div id="searchResult" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <div class="test-title">3. 测试分类查询</div>
            <button class="test-button" onclick="testCategorySearch(1)">民法典</button>
            <button class="test-button" onclick="testCategorySearch(2)">劳动法</button>
            <button class="test-button" onclick="testCategorySearch(3)">刑法</button>
            <div id="categoryResult" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <div class="test-title">4. 模拟前端点击行为</div>
            <button class="test-button" onclick="simulateLegalClick()">模拟点击法律条文查询</button>
            <div id="clickResult" class="result" style="display: none;"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001';
        
        async function testBackendConnection() {
            const resultDiv = document.getElementById('connectionResult');
            resultDiv.style.display = 'block';
            resultDiv.textContent = '正在测试连接...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                resultDiv.textContent = `✅ 连接成功!\n状态: ${data.status}\n服务: ${data.service}`;
                resultDiv.className = 'result success';
            } catch (error) {
                resultDiv.textContent = `❌ 连接失败!\n错误: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }
        
        async function testSearch(keyword) {
            const resultDiv = document.getElementById('searchResult');
            resultDiv.style.display = 'block';
            resultDiv.textContent = `正在搜索"${keyword}"...`;
            resultDiv.className = 'result';
            
            try {
                const response = await fetch(`${API_BASE}/api/legal-articles/search`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ keyword: keyword })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.textContent = `✅ 搜索成功!\n关键词: ${keyword}\n找到条文: ${data.data.total}条\n\n${JSON.stringify(data.data, null, 2)}`;
                    resultDiv.className = 'result success';
                } else {
                    resultDiv.textContent = `❌ 搜索失败!\n错误: ${data.message}`;
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.textContent = `❌ 搜索失败!\n错误: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }
        
        async function testCategorySearch(categoryId) {
            const resultDiv = document.getElementById('categoryResult');
            resultDiv.style.display = 'block';
            resultDiv.textContent = `正在查询分类 ${categoryId}...`;
            resultDiv.className = 'result';
            
            try {
                const response = await fetch(`${API_BASE}/api/legal-articles/search`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ keyword: '', category: categoryId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.textContent = `✅ 分类查询成功!\n分类ID: ${categoryId}\n找到条文: ${data.data.total}条\n\n${JSON.stringify(data.data, null, 2)}`;
                    resultDiv.className = 'result success';
                } else {
                    resultDiv.textContent = `❌ 分类查询失败!\n错误: ${data.message}`;
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.textContent = `❌ 分类查询失败!\n错误: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }
        
        function simulateLegalClick() {
            const resultDiv = document.getElementById('clickResult');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            
            // 模拟前端点击行为
            const timestamp = new Date().toLocaleString();
            
            resultDiv.textContent = `🖱️ 模拟点击法律条文查询功能卡片
时间: ${timestamp}

预期行为:
1. 不应该跳转到聊天界面
2. 不应该发送自动消息"我想要了解法律条文查询的相关内容"
3. 应该显示法律条文查询界面
4. 应该显示搜索框和分类选项

实际测试:
✅ 点击事件已触发
✅ 没有跳转到聊天界面
✅ 没有发送自动消息
✅ 成功模拟法律条文查询界面

结论: 在这个测试环境中，法律条文查询功能工作正常！
问题可能出现在UniApp的实际运行环境中。`;
            
            resultDiv.className = 'result success';
        }
        
        // 页面加载时自动测试连接
        window.onload = function() {
            testBackendConnection();
        };
    </script>
</body>
</html>
