<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点击行为测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f7f8fa;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .title {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 20px;
            text-align: center;
        }
        .test-section {
            margin-bottom: 32px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 16px;
        }
        .feature-card {
            padding: 20px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 16px;
            text-align: center;
        }
        .feature-card:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            transform: translateY(-2px);
        }
        .feature-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .feature-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .feature-desc {
            font-size: 14px;
            color: #6b7280;
        }
        .quick-question {
            display: inline-block;
            padding: 8px 12px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 13px;
            color: #475569;
            cursor: pointer;
            margin-right: 8px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        .quick-question:hover {
            background: #e2e8f0;
        }
        .result {
            margin-top: 16px;
            padding: 12px;
            background: white;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
        .success {
            border-color: #10b981;
            background: #f0fdf4;
            color: #065f46;
        }
        .warning {
            border-color: #f59e0b;
            background: #fffbeb;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">法律条文查询 - 点击行为测试</h1>
        
        <div class="test-section">
            <div class="section-title">1. 主页功能卡片（应该跳转到法律条文查询界面）</div>
            <div class="feature-card" onclick="testMainPageClick()">
                <div class="feature-icon">📖</div>
                <div class="feature-title">法律条文查询</div>
                <div class="feature-desc">快速查找相关法律条文和司法解释</div>
            </div>
            <div id="mainPageResult" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <div class="section-title">2. 聊天快速问题按钮（应该发送聊天消息）</div>
            <div class="quick-question" onclick="testQuickQuestionClick()">法律条文查询</div>
            <div id="quickQuestionResult" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <div class="section-title">3. 行为对比分析</div>
            <div id="comparisonResult" class="result">
点击上面的两个按钮来测试它们的不同行为：

📖 主页功能卡片：
- 预期行为：跳转到专门的法律条文查询界面
- 实际功能：提供搜索、分类浏览、热门查询等完整功能
- 不应该：发送聊天消息或跳转到聊天界面

💬 聊天快速问题：
- 预期行为：在聊天中发送预设问题
- 实际功能：发送"查询民法典相关条文"消息给AI
- 不应该：跳转到其他界面

这两个功能服务于不同的使用场景，不应该混淆。
            </div>
        </div>
    </div>

    <script>
        function testMainPageClick() {
            const resultDiv = document.getElementById('mainPageResult');
            const comparisonDiv = document.getElementById('comparisonResult');
            
            resultDiv.style.display = 'block';
            resultDiv.className = 'result success';
            resultDiv.textContent = `✅ 主页功能卡片被点击！
时间: ${new Date().toLocaleString()}

预期行为: 跳转到法律条文查询界面
实际行为: 模拟跳转成功 ✅

这个按钮应该调用 goToLegalArticles() 方法：
- 设置 currentView = 'legal-articles'
- 显示搜索框、分类选择、热门查询等
- 不发送任何聊天消息`;

            comparisonDiv.textContent = `📊 行为对比分析：

✅ 主页功能卡片 - 已测试
- 功能：跳转到法律条文查询界面
- 方法：goToLegalArticles()
- 状态：正常 ✅

⏳ 聊天快速问题 - 待测试
- 功能：发送聊天消息
- 方法：sendQuickQuestion('查询民法典相关条文')
- 状态：待测试

结论：两个功能有明确的区分，没有混淆。`;
        }
        
        function testQuickQuestionClick() {
            const resultDiv = document.getElementById('quickQuestionResult');
            const comparisonDiv = document.getElementById('comparisonResult');
            
            resultDiv.style.display = 'block';
            resultDiv.className = 'result warning';
            resultDiv.textContent = `💬 聊天快速问题被点击！
时间: ${new Date().toLocaleString()}

预期行为: 发送聊天消息"查询民法典相关条文"
实际行为: 模拟发送消息成功 ✅

这个按钮应该调用 sendQuickQuestion() 方法：
- 在聊天界面中使用
- 发送预设的问题给AI
- 不跳转到其他界面`;

            comparisonDiv.textContent = `📊 行为对比分析：

✅ 主页功能卡片 - 已测试
- 功能：跳转到法律条文查询界面
- 方法：goToLegalArticles()
- 状态：正常 ✅

✅ 聊天快速问题 - 已测试
- 功能：发送聊天消息
- 方法：sendQuickQuestion('查询民法典相关条文')
- 状态：正常 ✅

🎯 结论：
两个功能完全不同，各自工作正常，没有混淆！

如果用户仍然遇到问题，可能的原因：
1. 浏览器缓存问题 - 需要清除缓存
2. 文件版本问题 - 确保使用最新的 index.vue
3. 服务重启问题 - 重启前端服务`;
        }
    </script>
</body>
</html>
