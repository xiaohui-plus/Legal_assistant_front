<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API连接测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .result { margin: 10px 0; padding: 10px; background: #f9f9f9; border-radius: 3px; white-space: pre-wrap; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 API连接测试工具</h1>
        <p>当前API地址: <strong id="api-url">http://localhost:8002</strong></p>
        
        <div class="test-section">
            <h3>1. 后端健康检查</h3>
            <button onclick="testHealth()">测试健康检查</button>
            <div id="health-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>2. 聊天API测试</h3>
            <button onclick="testChat()">测试聊天API</button>
            <div id="chat-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>3. 法律条文搜索API测试</h3>
            <button onclick="testSearch()">测试搜索API</button>
            <div id="search-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>4. 网络连接诊断</h3>
            <button onclick="diagnoseNetwork()">诊断网络</button>
            <div id="network-result" class="result"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8002';
        document.getElementById('api-url').textContent = API_BASE;
        
        async function testHealth() {
            const resultDiv = document.getElementById('health-result');
            resultDiv.innerHTML = '正在测试...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                resultDiv.innerHTML = `✅ 健康检查成功
状态: ${data.status}
服务: ${data.service}
响应时间: ${Date.now() - startTime}ms`;
                resultDiv.className = 'result success';
            } catch (error) {
                resultDiv.innerHTML = `❌ 健康检查失败
错误: ${error.message}
可能原因: 后端服务未启动或端口错误`;
                resultDiv.className = 'result error';
            }
        }
        
        async function testChat() {
            const resultDiv = document.getElementById('chat-result');
            resultDiv.innerHTML = '正在测试...';
            resultDiv.className = 'result';
            
            const startTime = Date.now();
            
            try {
                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: '测试消息' })
                });
                
                const data = await response.json();
                
                resultDiv.innerHTML = `✅ 聊天API测试成功
成功: ${data.success}
回复长度: ${data.response ? data.response.length : 0}
相关条文: ${data.related_articles ? data.related_articles.length : 0}
响应时间: ${Date.now() - startTime}ms`;
                resultDiv.className = 'result success';
            } catch (error) {
                resultDiv.innerHTML = `❌ 聊天API测试失败
错误: ${error.message}
请求URL: ${API_BASE}/api/chat`;
                resultDiv.className = 'result error';
            }
        }
        
        async function testSearch() {
            const resultDiv = document.getElementById('search-result');
            resultDiv.innerHTML = '正在测试...';
            resultDiv.className = 'result';
            
            const startTime = Date.now();
            
            try {
                const response = await fetch(`${API_BASE}/api/legal-articles/search`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ keyword: '试用期' })
                });
                
                const data = await response.json();
                
                resultDiv.innerHTML = `✅ 搜索API测试成功
成功: ${data.success}
搜索结果: ${data.data ? data.data.articles.length : 0} 条
搜索类型: ${data.data ? data.data.search_type : '未知'}
响应时间: ${Date.now() - startTime}ms`;
                resultDiv.className = 'result success';
            } catch (error) {
                resultDiv.innerHTML = `❌ 搜索API测试失败
错误: ${error.message}
请求URL: ${API_BASE}/api/legal-articles/search`;
                resultDiv.className = 'result error';
            }
        }
        
        async function diagnoseNetwork() {
            const resultDiv = document.getElementById('network-result');
            resultDiv.innerHTML = '正在诊断...';
            resultDiv.className = 'result';
            
            let diagnosis = '🔍 网络诊断结果:\n\n';
            
            // 测试不同端口
            const ports = [8001, 8002];
            for (const port of ports) {
                try {
                    const response = await fetch(`http://localhost:${port}/health`, { 
                        signal: AbortSignal.timeout(3000) 
                    });
                    diagnosis += `✅ 端口 ${port}: 可访问\n`;
                } catch (error) {
                    diagnosis += `❌ 端口 ${port}: ${error.message}\n`;
                }
            }
            
            // 检查浏览器信息
            diagnosis += `\n📱 浏览器信息:\n`;
            diagnosis += `User Agent: ${navigator.userAgent}\n`;
            diagnosis += `当前URL: ${window.location.href}\n`;
            diagnosis += `协议: ${window.location.protocol}\n`;
            
            resultDiv.innerHTML = diagnosis;
            resultDiv.className = 'result';
        }
        
        // 页面加载时自动运行诊断
        window.onload = function() {
            console.log('API测试页面加载完成');
            testHealth();
        };
    </script>
</body>
</html>
